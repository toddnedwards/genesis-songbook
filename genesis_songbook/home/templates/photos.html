{% extends 'base.html' %}
{% load static %}

{% block title %}Photos - Genesis Songbook{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
<style>
    body {
        background-color: #212529;
    }
    .gallery-grid {
        columns: 3;
        column-gap: 12px;
    }
    .gallery-item {
        break-inside: avoid;
        margin-bottom: 12px;
        overflow: hidden;
        border-radius: 6px;
        display: block;
    }
    .gallery-item img {
        width: 100%;
        display: block;
        transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .gallery-item:hover img {
        transform: scale(1.04);
        opacity: 0.85;
    }
    @media (max-width: 768px) {
        .gallery-grid { columns: 2; }
    }
    @media (max-width: 480px) {
        .gallery-grid { columns: 1; }
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-dark">
    <h1 class="text-center my-5 text-white">Photos</h1>

    <div class="gallery-grid container-fluid">

        <!-- Replace the src values with your actual image paths e.g. {% static 'img/photo1.jpg' %} -->

        <a href="{{ MEDIA_URL }}john-lovegrove.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}john-lovegrove.webp" alt="John Lovegrove">
        </a>
        <a href="{{ MEDIA_URL }}todd-nathaniel.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}todd-nathaniel.webp" alt="Todd Nathaniel">
        </a>
        <a href="{{ MEDIA_URL }}full-band.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}full-band.webp" alt="Genesis Songbook full band">
        </a>
       <a href="{{ MEDIA_URL }}chris-oconnell.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}chris-oconnell.webp" alt="Chris O'Connell">
        </a> 
        <a href="{{ MEDIA_URL }}leon-parr.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}leon-parr.webp" alt="Leon Parr">
        </a>

        <a href="{{ MEDIA_URL }}live-phil.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}live-phil.jpg" alt="Genesis Songbook live at the Liverpool Philharmonic">
        </a>
        
        <a href="{{ MEDIA_URL }}tony-turrell.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}tony-turrell.webp" alt="Tony Turrell">
        </a>
                <a href="{{ MEDIA_URL }}band-audience-backdrop.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}band-audience-backdrop.webp" alt="Genesis Songbook Tribute Band">
        </a>
        <a href="{{ MEDIA_URL }}chris-2.webp" class="gallery-item glightbox" data-gallery="band-photos">
            <img src="{{ MEDIA_URL }}chris-2.webp" alt="Chris Genesis Songbook">
        </a>

    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
<script>
    GLightbox({ selector: '.glightbox' });
</script>
{% endblock %}
